<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
  <title id="title">SentryLoom GitHub community growth</title>
  <desc id="desc">Time-series lines for GitHub stars and current contributors. Latest values: 0 stars and 1 contributors.</desc>
  <style>
    .background{fill:#0d1117}.plot{fill:#161b22;stroke:#30363d}.grid{stroke:#30363d;stroke-width:1}.axis{stroke:#8b949e;stroke-width:1.2}
    .title{fill:#f0f6fc;font:700 22px "Segoe UI",Arial,sans-serif}.subtitle{fill:#8b949e;font:13px "Segoe UI",Arial,sans-serif}
    .tick{fill:#8b949e;font:11px "Segoe UI",Arial,sans-serif}.legend{fill:#c9d1d9;font:13px "Segoe UI",Arial,sans-serif}
    .stars{fill:none;stroke:#f2cc60;stroke-width:3;stroke-linejoin:round;stroke-linecap:round}
    .contributors{fill:none;stroke:#2f81f7;stroke-width:3;stroke-linejoin:round;stroke-linecap:round}
    .star-dot{fill:#f2cc60}.contributor-dot{fill:#2f81f7}
  </style>
  <rect width="100%" height="100%" rx="12" class="background"/>
  <text x="72" y="30" class="title">SentryLoom community growth</text>
  <text x="932" y="30" text-anchor="end" class="subtitle">Updated 2026-07-04</text>
  <rect x="72" y="54" width="860" height="314" rx="6" class="plot"/>
  <line x1="72" y1="368" x2="932" y2="368" class="grid"/>
      <text x="60" y="372" text-anchor="end" class="tick">0</text>
<line x1="72" y1="305.2" x2="932" y2="305.2" class="grid"/>
      <text x="60" y="309.2" text-anchor="end" class="tick">1</text>
<line x1="72" y1="242.39999999999998" x2="932" y2="242.39999999999998" class="grid"/>
      <text x="60" y="246.39999999999998" text-anchor="end" class="tick">2</text>
<line x1="72" y1="179.6" x2="932" y2="179.6" class="grid"/>
      <text x="60" y="183.6" text-anchor="end" class="tick">3</text>
<line x1="72" y1="116.79999999999998" x2="932" y2="116.79999999999998" class="grid"/>
      <text x="60" y="120.79999999999998" text-anchor="end" class="tick">4</text>
<line x1="72" y1="54" x2="932" y2="54" class="grid"/>
      <text x="60" y="58" text-anchor="end" class="tick">5</text>
  <line x1="72" y1="368" x2="932" y2="368" class="axis"/>
  <polyline points="502.0,368.0" class="stars"/>
  <polyline points="502.0,305.2" class="contributors"/>
  <circle cx="502" cy="368" r="3.5" class="star-dot"/>
  <circle cx="502" cy="305.2" r="3.5" class="contributor-dot"/>
  <text x="502" y="408" text-anchor="middle" class="tick">2026-07-04</text>
  <circle cx="72" cy="430" r="5" class="star-dot"/>
  <text x="84" y="434" class="legend">GitHub stars (0)</text>
  <circle cx="247" cy="430" r="5" class="contributor-dot"/>
  <text x="259" y="434" class="legend">Current contributors (1)</text>
</svg>
