name: Community metrics

on:
  schedule:
    - cron: "41 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Update stars and contributors chart
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node tools/update-community-metrics.js
      - name: Commit changed metrics
        run: |
          if git diff --quiet -- docs/community-metrics.json docs/community-metrics.svg; then
            echo "Metrics are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/community-metrics.json docs/community-metrics.svg
          git commit -m "docs: update community metrics [skip ci]"
          git push
